version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: battery-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=battery_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - TZ=Asia/Shanghai
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom_config.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - battery-network

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: battery-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/broker/version", "-C", "1", "-i", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - battery-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: battery-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=battery_monitor
      - RUST_LOG=info,battery_monitor=debug
      - RUST_BACKTRACE=1
      - MODEL_CONFIG_PATH=/app/model_config.json
    env_file:
      - .env
    depends_on:
      clickhouse:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    volumes:
      - ./backend/model_config.json:/app/model_config.json:ro
    networks:
      - battery-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        tag: "{{.Name}}/{{.ID}}"

  frontend:
    image: nginx:alpine
    container_name: battery-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - battery-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: battery-simulator
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - NUM_CABINETS=20
      - CHANNELS_PER_CABINET=512
      - REPORT_INTERVAL=10
      - ABNORMAL_RATIO=0.03
      - ANOMALY_DURATION_MIN=60
      - ANOMALY_DURATION_MAX=300
      - RATED_CAPACITY=3.2
    env_file:
      - .env
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - battery-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    profiles:
      - simulator
      - all

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: battery-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - battery-network
    profiles:
      - monitoring
      - all

  grafana:
    image: grafana/grafana:10.2.0
    container_name: battery-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - battery-network
    profiles:
      - monitoring
      - all

volumes:
  clickhouse_data:
    driver: local
  mqtt_data:
    driver: local
  mqtt_log:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  battery-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
