version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: battery-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=battery_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: battery-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/broker/version", "-C", "1", "-i", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: battery-backend
    ports:
      - "8080:8080"
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=battery_monitor
      - RUST_LOG=info
    depends_on:
      clickhouse:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - battery-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: battery-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - battery-network
    restart: unless-stopped

volumes:
  clickhouse_data:
  mqtt_data:
  mqtt_log:

networks:
  battery-network:
    driver: bridge
