# ============================================
# EMQX 配置文件 - 锂电池化成监控系统
# ============================================

# 节点名称
node.name = emqx@127.0.0.1
node.cookie = battery_monitor_cookie

# 数据目录
node.data_dir = /opt/emqx/data
node.log_dir = /opt/emqx/log

# ============================================
# 监听器配置
# ============================================

# TCP 监听器
listeners.tcp.default = 1883
listeners.tcp.default.bind = 0.0.0.0:1883
listeners.tcp.default.max_connections = 100000
listeners.tcp.default.acceptors = 16
listeners.tcp.default.send_timeout = 15s
listeners.tcp.default.backlog = 4096
listeners.tcp.default.send_timeout_close = true

# SSL 监听器
listeners.ssl.default.bind = 0.0.0.0:8883
listeners.ssl.default.max_connections = 100000
listeners.ssl.default.acceptors = 16
listeners.ssl.default.send_timeout = 15s
listeners.ssl.default.send_timeout_close = true

# WebSocket 监听器
listeners.ws.default.bind = 0.0.0.0:8083
listeners.ws.default.max_connections = 100000
listeners.ws.default.acceptors = 16
listeners.ws.default.send_timeout = 15s
listeners.ws.default.send_timeout_close = true

# WebSocket SSL 监听器
listeners.wss.default.bind = 0.0.0.0:8084
listeners.wss.default.max_connections = 100000
listeners.wss.default.acceptors = 16

# ============================================
# MQTT 协议配置
# ============================================

mqtt.max_packet_size = 1MB
mqtt.clientid_overflow = 23
mqtt.strict_mode = true
mqtt.ignore_loop_deliver = true
mqtt.conn_await_timeout = 30s
mqtt.keepalive_multiplier = 2.0
mqtt.max_inflight = 32
mqtt.max_mqueue_len = 1000
mqtt.mqueue_priorities = none
mqtt.mqueue_default_priority = lowest
mqtt.mqueue_store_qos0 = true

# ============================================
# 订阅配置
# ============================================

subscription.max_subscriptions = infinity
subscription.subscription_identifier_enabled = true
subscription.shared_subscription_enabled = true
subscription.shared_subscription_strategy = random

# ============================================
# 保留消息配置
# ============================================

retainer.enable = true
retainer.storage_type = disc
retainer.max_retained_messages = infinity
retainer.expiry_interval = infinity
retainer.max_payload_size = 1MB

# ============================================
# 安全配置
# ============================================

# 允许匿名认证（开发环境）
auth.anonymous = true

# ACL 配置
acl_nomatch = allow
acl_file = /opt/emqx/etc/acl.conf
acl_cache_ttl = 1m
acl_cache_max_size = 32

# ============================================
# 规则引擎配置
# ============================================

rule_engine.enable = true

# ============================================
# 日志配置
# ============================================

log.level = info
log.file.enable = true
log.file.level = info
log.file.path = /opt/emqx/log
log.file.rotation_count = 10
log.file.rotation_size = 50MB
log.file.max_size = 100MB
log.syslog.enable = false
log.console.enable = false

# ============================================
# 监控配置
# ============================================

prometheus.enable = true
prometheus.mqtt_counters = true
prometheus.mqtt_gauge = true
prometheus.erlang_vm = true
prometheus.force_gc_interval = 10s

# ============================================
# 集群配置
# ============================================

cluster.discovery_strategy = manual
cluster.autoheal = true
cluster.autoclean = 5m

# ============================================
# 连接管理
# ============================================

connection_manager.idle_timeout = 15s
connection_manager.drain_before_shutdown = 30s
connection_manager.inflight_window = 32
connection_manager.retry_interval = 500ms

# ============================================
# 消息队列配置
# ============================================

mqueue.max_length = 1000
mqueue.type = priority
mqueue.priorities = 5
mqueue.default_priority = lowest

# ============================================
# 插件配置
# ============================================

plugins.default_loaded_plugins = emqx_management,emqx_recon,emqx_retainer,emqx_dashboard,emqx_rule_engine
plugins.loaded_plugins_file = /opt/emqx/data/loaded_plugins
plugins.plugin_dir = /opt/emqx/plugins
plugins.expand_plugins_dir = /opt/emqx/lib/plugins

# ============================================
# Dashboard 配置
# ============================================

dashboard.listeners.http.bind = 0.0.0.0:18083
dashboard.listeners.http.max_connections = 1000
dashboard.listeners.http.acceptors = 4
dashboard.default_username = admin
dashboard.default_password = public
dashboard.expiry_interval = 1h
dashboard.sso_enabled = false

# ============================================
# 统计配置
# ============================================

sys_mon.top.num_procs = 5
sys_mon.top.num_ports = 5
sys_mon.top.num_channels = 5
sys_mon.long_gc = 500ms
sys_mon.long_schedule = 240ms
sys_mon.large_heap = 32MB
sys_mon.busy_port = true
sys_mon.dist_ctrl = true
sys_mon.flamegraph_enabled = true
sys_mon.flamegraph_sample_rate = 10ms

# ============================================
# 时区
# ============================================

timezone = Asia/Shanghai
