apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    database: battery_monitor
    user: default
    secureJsonData:
      password: ""
    jsonData:
      defaultDatabase: battery_monitor
      port: 8123
      server: clickhouse
      username: default
    editable: false
